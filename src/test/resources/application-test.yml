datasources:
  default:
    url: jdbc:tc:postgresql:16:///postgres
    driverClassName: org.testcontainers.jdbc.ContainerDatabaseDriver
    username: test
    password: test
    maximumPoolSize: 5
    minimumIdle: 1

jpa:
  default:
    properties:
      hibernate:
        hbm2ddl:
          auto: none
